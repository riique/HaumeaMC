# ========================================
#       HaumeaMC - Grupos e Permissões
#            Servidor HaumeaMC
# ========================================
# 
# ATENÇÃO: Este arquivo só pode ser modificado
# através do comando /hgroup pelo CONSOLE!
#
# Estrutura de um grupo:
#   nome:
#     prefix: "&cor&lTAG " (prefixo no chat/tab)
#     display: "Nome de Exibição"
#     priority: 100 (maior = mais importante)
#     permissions: (lista de permissões)
#     inheritance: (grupos que herda)
#
# ========================================

groups:
  # ============ STAFF ============
  
  dono:
    prefix: "&4&lDONO &4"
    display: "Dono"
    priority: 1000
    permissions:
      - "*"
      - "haumea.tag.*"
      - "haumea.fake"
    inheritance: []
    
  diretor:
    prefix: "&4&lDIRETOR &4"
    display: "Diretor"
    priority: 900
    permissions:
      - "haumea.tag.diretor"
      - "haumea.tag.gerente"
      - "haumea.tag.admin"
      - "haumea.tag.modplus"
      - "haumea.tag.modgc"
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - gerente
    
  gerente:
    prefix: "&c&lGERENTE &c"
    display: "Gerente"
    priority: 800
    permissions:
      - "haumea.tag.gerente"
      - "haumea.tag.admin"
      - "haumea.tag.modplus"
      - "haumea.tag.modgc"
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - admin
    
  admin:
    prefix: "&c&lADMIN &c"
    display: "Admin"
    priority: 700
    permissions:
      - "haumea.tag.admin"
      - "haumea.tag.modplus"
      - "haumea.tag.modgc"
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - modplus
    
  modplus:
    prefix: "&5&lMOD+ &5"
    display: "Mod+"
    priority: 600
    permissions:
      - "haumea.tag.modplus"
      - "haumea.tag.modgc"
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - modgc
    
  modgc:
    prefix: "&5&lMODGC &5"
    display: "ModGC"
    priority: 550
    permissions:
      - "haumea.tag.modgc"
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - mod
    
  mod:
    prefix: "&5&lMOD &5"
    display: "Mod"
    priority: 500
    permissions:
      - "haumea.tag.mod"
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - trial
    
  trial:
    prefix: "&d&lTRIAL &d"
    display: "Trial"
    priority: 400
    permissions:
      - "haumea.tag.trial"
      - "haumea.tag.normal"
    inheritance:
      - membro
    
  # ============ OUTROS STAFF ============
  
  builder:
    prefix: "&e&lBUILDER &e"
    display: "Builder"
    priority: 350
    permissions:
      - "haumea.tag.builder"
      - "haumea.tag.normal"
