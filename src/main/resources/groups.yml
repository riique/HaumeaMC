  # ============ OUTROS ============
  
  designer:
    prefix: "&2&lDESIGNER &2"
    display: "Designer"
    priority: 100
    permissions:
      - "haumea.tag.designer"
      - "haumea.tag.normal"
    inheritance:
      - membro
    
  # ============ PADRÃO ============
  
  membro:
    prefix: "&7"
    display: "Membro"
    priority: 0
    permissions:
      - "haumea.tag.normal"
      - "haumea.tag"
    inheritance: []
