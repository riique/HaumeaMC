# ==============================================================================
# HaumeaMC - Configuração de Kits (Abilities)
# ==============================================================================
# Este arquivo define todos os kits disponíveis no servidor.
#
# Cada kit pode ter:
#   - display: Nome colorido do kit (use & para cores)
#   - icon: Material do ícone (nome do enum Material do Bukkit)
#   - icon-data: Data value do ícone (para variantes)
#   - description: Lista de linhas de descrição
#   - price: Preço para alugar por 1 semana (0 = gratuito)
#   - permission: Permissão necessária para usar o kit
#   - incompatible: Lista de kits incompatíveis
#   - default: Se true, todos os jogadores têm acesso
#   - rarity: Raridade do kit (COMMON, RARE, EPIC, LEGENDARY, MYSTIC)
#   - cooldown: Cooldown da habilidade em segundos
# ==============================================================================

