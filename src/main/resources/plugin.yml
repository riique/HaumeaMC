name: HaumeaPVP
version: ${project.version}
main: com.haumea.kitpvp.HaumeaMC
author: HaumeaMC
description: Plugin completo para o servidor HaumeaMC
api-version: 1.8

# ProtocolLib é opcional - quando presente, habilita login premium automático
softdepend: [ProtocolLib]

commands:
  tag:
    description: Gerencia suas tags
    usage: /<command> [nome da tag]
    aliases: [tags]
    
  haumeagroups:
    description: Gerencia múltiplos grupos dos jogadores (Dono/Diretor/Gerente)
    usage: /<command> <add|remove|list|info|reload> [args]
    aliases: [haumeagrupos, haumeagrupo, haumeagroup, hgroups, hgroup, setgroup, grupos]

  # Comandos Essenciais
  tp:
    description: Teleporta você até um jogador
    usage: /<command> <jogador>
    
  tpall:
    description: Teleporta todos os jogadores até você
    usage: /<command>
    
  puxar:
    description: Traz um jogador até você
    usage: /<command> <jogador>
    
  inv:
    description: Abre o inventário de outro jogador
    usage: /<command> <jogador>
    aliases: [invsee, inventario]
    
  kill:
    description: Mata um jogador instantaneamente
    usage: /<command> <jogador>
    
  ipcheck:
    description: Mostra o IP de um jogador
    usage: /<command> <jogador>
    aliases: [ip]
    
  bc:
    description: Envia mensagem global para o servidor
    usage: /<command> <mensagem>
    aliases: [broadcast, anuncio]
    
  tell:
    description: Envia mensagem privada
    usage: /<command> <jogador> <mensagem>
    aliases: [msg, w, whisper, pm]
    
  ping:
    description: Mostra seu ping ou de outro jogador
    usage: /<command> [jogador]
    aliases: [latency, latencia]
    
  regras:
    description: Mostra as regras do servidor
    usage: /<command>
    aliases: [rules]
    
  conta:
    description: Mostra estatísticas do jogador
    usage: /<command> [jogador]
    aliases: [stats, estatisticas, account]

  score:
    description: Ativa ou desativa a scoreboard
    usage: /<command> <on/off>
    aliases: [scoreboard, sb]

  haumeawarp:
    description: Gerencia as warps do servidor (Admin)
    usage: /<command> <set|del|tp|list|reload> [nome]
    aliases: [hwarp, warpadmin]
    permission: haumea.warp.admin

  warp:
    description: Teleporta para uma warp
    usage: /<command> <nome>
    aliases: [warps, ir]

  spawn:
    description: Teleporta ao spawn do servidor
    usage: /<command>
    aliases: [lobby]

  haumeaspawn:
    description: Define o spawn do servidor e raio de proteção (Admin)
    usage: /<command> [raio em blocos]
    aliases: [setspawn, hspawn]
    permission: haumea.spawn.admin

  medalha:
    description: Gerencia suas medalhas
    usage: /<command> [nome da medalha]
    aliases: [medal, medals, medalhas]

  fake:
    description: Altera seu nome de exibição (Fake Nick)
    usage: /<command> <nome|random|reset>
    aliases: [nick, fakenick]

  ranking:
    description: Abre o menu de ranking/ligas
    usage: /<command>
    aliases: [rank, elo, league, liga, ligas]

  # Comandos de Duelo 1v1
  duel:
    description: Sistema de duelos 1v1 - desafiar jogadores e gerenciar duelos
    usage: /<command> <jogador|accept|deny|fila|stats>
    aliases: [duelo, 1v1, x1]

  dueladmin:
    description: Comandos administrativos para o sistema de duelos
    usage: /<command> <setarena|delarena|listarenas|setlobby|forceend|reload>
    aliases: [da, dueladm]

  # Comandos de Evento
  evento:
    description: Sistema de eventos especiais do servidor
    usage: /<command> [subcomando]
    aliases: [event, events, eventos]

  # Comandos de Feast
  feast:
    description: Sistema de Feast - baús com itens valiosos
    usage: /<command> <start|stop|timer|addchest|removechest|list|status|reload>
    aliases: [feasts]
    permission: haumea.feast.admin

  # Comandos de Multiplicadores
  multiplicador:
    description: Gerencia seus multiplicadores de coins
    usage: /<command> [status|lista|ativar <tipo>]
    aliases: [multi, mult, mp]

  multadmin:
    description: Administração de multiplicadores (Staff)
    usage: /<command> <give|remove|activate|clear|check|list>
    aliases: [multiplicadoradmin, mpadmin]

  # Comando de Administração de Estatísticas
  haumeastats:
    description: Gerencia estatisticas de jogadores (Admin)
    usage: /<command> <jogador> <add|set|remove> <kills|deaths|streak|elo|moedas> <valor>
    aliases: [hstats, statsadmin]
    permission: haumea.admin.stats

  # Comando de VIP Keys
  haumeavip:
    description: Sistema de chaves VIP - ativar e gerenciar chaves
    usage: /<command> <código|criar|listar|check|deletar|info>
    aliases: [hvip, vipkey, vipkeys]

  # Comando de NPC (Lobby)
  npc:
    description: Gerencia NPCs clicaveis do Lobby
    usage: /<command> <create|remove|list|tp|setskin|reload>
    aliases: [npcs, lobbynpc]
    permission: haumea.admin.npc

permissions:
  # Permissão de Fake Nick
  haumea.fake:
    description: Permite usar o sistema de Fake Nick
    default: false

  # Permissão de Chat Destacado
  haumea.chat.destaque:
    description: Mensagens aparecem destacadas com espacos antes e depois
    default: op
    
  haumea.tag:
    description: Permite usar o comando /tag
    default: true
  
  # Permissões de Tags
  haumea.tag.*:
    description: Acesso a todas as tags
    default: op
    children:
      haumea.tag.dono: true
      haumea.tag.diretor: true
      haumea.tag.gerente: true
