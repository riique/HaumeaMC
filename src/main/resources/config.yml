# ========================================
#          HaumeaMC - Configuração
#            Servidor HaumeaMC
# ========================================

# ========================================
#            TIPO DE SERVIDOR
# ========================================
# Define como o plugin deve se comportar neste servidor.
# 
# Valores possíveis:
#   KITPVP - Servidor de combate (carrega todos os sistemas)
#   LOBBY  - Servidor de lobby (carrega apenas sistemas essenciais)
#
# KITPVP carrega: kits, sopas, duelos, eventos, feast, cassino, cosméticos, etc.
# LOBBY carrega: chat, tags, grupos, banco de dados, seletor de servidores.
server-type: KITPVP

# ========================================
#       CONFIGURAÇÕES DO LOBBY
# ========================================
# Estas configurações são usadas APENAS quando server-type: LOBBY
lobby:
  # Item seletor de servidores
  selector-item:
    material: COMPASS
    name: "&a&lSERVIDORES"
    slot: 4  # Slot na hotbar (0-8)
    lore:
      - ""
      - "&7Clique para escolher"
      - "&7um servidor para jogar!"
      - ""
      - "&e&lCLIQUE PARA ABRIR"
  
  # Servidores disponíveis para selecionar
  # O 'id' DEVE corresponder ao nome do servidor no BungeeCord!
  servers:
    kitpvp:
      name: "&c&lKITPVP"
      material: DIAMOND_SWORD
      data: 0
      slot: 13  # Slot no menu de seleção
      lore:
        - "&7Servidor de PvP com kits!"
        - "&7Lute, mate e suba no ranking!"
        - ""
        - "&b&l» &7Elimine inimigos"
        - "&b&l» &7Escolha seu kit favorito"
        - "&b&l» &7Participe de eventos"
      action: "&e&lCLIQUE PARA ENTRAR"
  
  # =============================================
  #       NPCs CLICÁVEIS DO LOBBY
  # =============================================
  # NPCs com skins que ao clicar redirecionam para servidores
  # Usa ProtocolLib para criar NPCs fake com skins da Mojang API
  # 
  # Configuração de cada NPC:
  #   display-name: Nome colorido do NPC
  #   skin: Nome de um jogador Mojang para usar a skin
  #   server: Nome do servidor no Velocity (DEVE ser exato)
  #   location: Posição onde spawnar o NPC
  #   hologram: Linhas do holograma ({players} = jogadores online)
  
  npcs:
    kitpvp:
      display-name: "&c&lKitPvP"
      skin: "Technoblade"
      server: "kitpvp"
      location:
        world: "world"
        x: 0.5
        y: 65.0
        z: 5.5
        yaw: 180.0
        pitch: 0.0
      hologram:
        - "&6&lKITPVP"
        - "&7Jogando: &a{players}"
        - ""
        - "&e&lCLIQUE PARA JOGAR"
    
    # Exemplo de mais NPCs (descomente para usar):
    # survival:
    #   display-name: "&a&lSurvival"
    #   skin: "Dream"
    #   server: "survival"
    #   location:
    #     world: "world"
    #     x: 5.5
    #     y: 65.0
    #     z: 5.5
    #     yaw: 180.0
    #     pitch: 0.0
    #   hologram:
    #     - "&2&lSURVIVAL"
    #     - "&7Jogando: &a{players}"
    #     - ""
    #     - "&e&lCLIQUE PARA JOGAR"


# Configurações Gerais
configuracoes:
  prefixo: "&8[&6Haumea&8] "
  debug: false

# ========================================
#              ÁREA DE SPAWN
# ========================================
# Configurações da área de proteção do spawn.
# Jogadores dentro desta área não podem receber dano.
#
# Para configurar:
# 1. Use /haumeawarp set spawn para definir o centro
# 2. Ajuste o raio abaixo conforme seu spawn
spawn:
  # Raio da área protegida em blocos (a partir do warp "spawn")
  raio: 50
  # Verificar apenas X e Z (ignora altura Y)
  ignorar-altura: true
# ========================================
#              BANCO DE DADOS
# ========================================

# Configuração do MongoDB
# O MongoDB é usado para persistência de dados de jogadores,
# contas, punições, reports, warps e outros dados.
#
# Para desenvolvimento local:
# - Instale MongoDB Community: https://www.mongodb.com/try/download/community
# - Deixe as configurações padrão abaixo
#
# Para VPS/produção:
# - Configure host com IP da VPS ou localhost se MongoDB estiver na mesma máquina
# - Configure username e password para segurança
mongodb:
  enabled: true
  host: "localhost"
  port: 27017
  database: "haumeamc"
  # Autenticação (deixe vazio para desenvolvimento local sem senha)
  username: ""
  password: ""
  auth-database: "admin"

