# ========================================
#              COOLDOWNS
# ========================================
# Configuração de tempos de espera (em segundos)
# Use -1 para desativar o cooldown

cooldowns:
  # Comandos gerais
  comandos:
    tell: 2          # Mensagem privada
    report: 30       # Reportar jogador
    pay: 5           # Enviar coins
    trade: 10        # Solicitar trade
  
  # Sistema de kits
  kits:
    selecionar: 0    # Trocar de kit (0 = sem cooldown no spawn)
    habilidade: 5    # Usar habilidade de kit
  
  # Teleporte
  teleporte:
    warp: 3          # Usar /warp
    spawn: 3         # Usar /spawn
    warmup: 3        # Tempo de preparação antes de teleportar
  
  # Sistema de combate
  combate:
    sopa: 0          # Usar sopa (0 = sem cooldown)
    attack: 0        # Atacar (0 = vanilla)
  
  # Itens especiais
  itens:
    supply: 30       # Coletar suprimentos
    kit_preview: 1   # Visualizar kit
# ========================================
#           ANTIFLOOD & ANTISPAM
# ========================================
# Sistema INTELIGENTE que detecta:
# - FLOOD: Muitas mensagens em pouco tempo
# - SPAM: Mensagens iguais/similares consecutivas
#
# NÃO limita mensagens normais!
# Permissão de bypass: haumea.chat.bypass.flood
antiflood:
  # === DETECÇÃO DE FLOOD (VOLUME) ===
  # Detecta muitas mensagens em pouco tempo
  max-messages: 5        # Máximo de mensagens
  window-seconds: 3      # Em X segundos
  # Ex: 5 mensagens em 3 segundos = FLOOD
  
  # === DETECÇÃO DE SPAM (REPETIÇÃO) ===
  # Detecta mensagens iguais/similares CONSECUTIVAS (independente do tempo!)
  consecutive-similar: 3        # Quantas mensagens similares consecutivas = spam
  similarity-threshold: 0.7     # Quanto similar (0.0 a 1.0, 0.7 = 70% igual)
  history-size: 10              # Quantas mensagens guardar no histórico
  # Ex: Enviar "oi" 3 vezes seguidas = SPAM
  
  # === PUNIÇÃO ===
  punishment-seconds: 5         # Silenciado por X segundos
  punishment-multiplier: 2.0    # Dobra por reincidência (5s, 10s, 20s...)
  max-punishment-seconds: 60    # Máximo de 60 segundos
  
  # === RESET ===
  violation-decay-seconds: 120  # Violações resetam após 2 min de bom comportamento

# ========================================
#              SISTEMA DE CASSINO
# ========================================
# Sistema de jogos de azar e apostas
# Jogadores podem apostar coins em diversos jogos

casino:
  # Habilitar/desabilitar todo o sistema
  enabled: true
  
  # Slot na hotbar do spawn (0-8)
  hotbar-slot: 2
  
  # Só permite jogar no spawn
  only-in-spawn: true
  
  # Limites de apostas
  limits:
    min-bet: 100
    max-bet: 100000
    # Limite diário de perdas (0 = desabilitado)
    daily-loss-limit: 500000
  
  # Valores de aposta pré-definidos (aparecem nos menus)
  preset-bets:
    - 100
    - 500
    - 1000
    - 5000
    - 10000
  
  # Permitir aposta customizada
  allow-custom-bet: true
  
  # Taxa da casa (porcentagem removida do prêmio)
  house-edge:
    coinflip: 5  # 5% = 2 jogadores apostam 1000 cada, vencedor recebe 1900
  
  # Probabilidades do Slots (devem somar 100)
  slots:
    lose: 55
    two-match: 30
    three-common: 10
    three-rare: 4
    # jackpot = 100 - (55+30+10+4) = 1%
  
  # Multiplicadores de prêmio
  multipliers:
    slots:
      two-match: 1.5
      three-common: 3.0
      three-rare: 10.0
      jackpot: 25.0
    blackjack:
      win: 2.0
      natural: 2.5
  
  # Configurações do Crash
  crash:
    # Segundos entre rodadas
    round-interval: 30
  
  # Broadcasts de vitórias grandes
  broadcasts:
    # Valor mínimo para broadcast
    big-win-threshold: 50000
    # Habilitar broadcasts
    jackpot: true
    coinflip: true

# Mensagens do Plugin
mensagens:
