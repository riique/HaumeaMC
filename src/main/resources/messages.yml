# ==============================================================================
# 2.5. BROADCAST (Sistema de Avisos Premium)
# ==============================================================================
broadcast:
  # Formato do chat - Visual extremamente bonito
  format:
    header:
      - ""
      - "&8&m------------&r  &6&l* &e&lAVISO DO SERVIDOR &6&l*  &8&m------------&r"
      - ""
    message: "         &f&l>> &e{message}"
    footer:
      - ""
      - "&8&m----------------------------------------------------&r"
      - ""
  
  # Título que aparece na tela dos jogadores
  title:
    main: "&6&l* AVISO *"
    subtitle: "&fUm administrador enviou uma mensagem!"
  
  # Mensagem enviada para quem usou o comando
  sent: "&6&lBROADCAST &fSeu aviso foi enviado para &e{count} &fjogadores!"

