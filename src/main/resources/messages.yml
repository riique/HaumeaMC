# ==============================================================================
#                        HAUMEAMC - ARQUIVO DE MENSAGENS
# ==============================================================================
# Este arquivo contem todas as mensagens do plugin KitPvP.
# Voce pode alterar textos, cores e formatacoes aqui.
#
# Suporte a cores:
# - Use '&' para cores (ex: &a para verde claro)
# - Use '{nl}' para pular linha (se suportado pelo sistema)
#
# Variaveis:
# - A maioria das mensagens suporta variaveis como {player}, {amount}, etc.
# - Nao remova variaveis essenciais das mensagens.
# ==============================================================================

# ==============================================================================
# 1. SISTEMA (Prefixos, Cores, Erros Gerais, Sucesso)
# ==============================================================================
system:
  prefix:
    general: "&6&lHAUMEA&f&lMC&8 >>&f "
    tags: "&9&lTAGS&f "
    error: "&c&lERRO&f "
    success: "&a&lSUCESSO&f "
    admin: "&4&lADMIN&f "
    groups: "&6&lHAUMEAGROUPS&f "
    staff-broadcast: "&e&l[HAUMEA-STAFF] &f"
    punishment: "&4&lPUNISH &f"
    event: "&6&lEVENTO &8>> &f"
    feast: "&6&lFEAST &8>> &f"
    premium: "&b&lPREMIUM &8>> &f"
    auth: "&e&lAUTH &8>> &f"
    multiplier: "&6&l[BOLT] &eMULTIPLICADOR &8>> &f"
    vip: "&6&lVIP &8>> &f"
    ability: "&6&lHAUMEAMC&f "
    bounty: "&6&lBOUNTY &8>> &f"
  
  color:
    primary: "&6"
    secondary: "&f"
    highlight: "&e"
    error: "&c"
    success: "&a"
    info: "&7"
  
  separator: "&8&m----------------------------------------"

# ==============================================================================
# 1.1 ANTIFLOOD & ANTISPAM (Sistema Inteligente)
# ==============================================================================
# O sistema NÃO bloqueia mensagens normais!
# FLOOD = muitas mensagens em pouco tempo
# SPAM = mensagens iguais/similares consecutivas
antiflood:
  # Mensagem quando FLOOD é detectado (muitas mensagens rápidas)
  detected-flood: |
    
    &c&lX FLOOD DETECTADO!
    
      &fVoce enviou &cmensagens demais &fem pouco tempo!
      &7Voce foi silenciado por &e{time}s&7.
    
      &8Dica: Espere um pouco antes de enviar mais mensagens.
    
  
  # Mensagem quando SPAM é detectado (mensagens repetidas)
  detected-spam: |
    
    &e&lX SPAM DETECTADO!
    
      &fVoce esta enviando &emensagens repetidas&f!
      &7Voce foi silenciado por &e{time}s&7.
    
      &8Dica: Evite repetir a mesma mensagem varias vezes.
    
  
  # Mensagem quando tenta falar mas ainda está punido
  still-punished: |
    
    &c&l[!] SILENCIADO
    
      &7Voce ainda esta em cooldown.
      &7Aguarde mais &e{time}s &7para enviar mensagens.
    


error:
  no-permission: "&c&lERRO&f Voce nao tem permissao para isso!"
  player-only: "&c&lERRO&f Este comando so pode ser executado por jogadores dentro do HaumeaMC."
  console-only: "&c&lERRO&f Este comando so pode ser executado pelo console."
  invalid-usage: "&c&lERRO&f Uso incorreto! Utilize: &e{usage}&f."
  invalid-number: "&c&lERRO&f O valor &e{value}&f nao e um numero valido!"
  profile-load: "&cErro ao carregar seu perfil!"

success:
  reload: "&a&lSUCESSO&f Plugin recarregado com sucesso!"
  save: "&a&lSUCESSO&f Dados salvos com sucesso!"
  
server:
